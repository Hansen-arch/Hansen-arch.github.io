# ============================================================
# PORTFOLIO CONFIGURATION
# ============================================================

site_name: "Reihan Apriandi — Forestry & Geospatial"
site_description: "Portfolio of Reihan Apriandi — Forestry, GIS, Remote Sensing, and Spatial Data Science"
site_author: "Reihan Apriandi"
site_url: "https://hansen-arch.github.io/"

theme:
  name: material
  icon:
    logo: material/pine-tree
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - content.code.copy
    - navigation.footer
  font:
    text: Inter
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hansen-arch
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/reihan-apriandi-700845266/
      name: LinkedIn
    - icon: material/email
      link: mailto:apriandireihan@gmail.com
      name: Email

copyright: "© 2026 Reihan Apriandi · Forestry & Spatial Data Science"

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "BioSift": projects/biosift.md
  - Experience: experience.md
  - Contact: contact.md