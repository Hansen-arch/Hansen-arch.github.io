# ============================================================
# PORTFOLIO CONFIGURATION
# This file is in the YAML format and is very sensitive to 
# spaces. Ensure to match the indentation level and spacing
# of new items with existing ones
# ============================================================

site_name: "Reihan Apriandi - Forestry & Geospatial Portfolio"
site_description: "Portfolio of Reihan Apriandi — Forestry, GIS, Remote Sensing, and Spatial Data Science"
site_author: "Reihan Apriandi"
site_url: "https://hansen-arch.github.io/"

theme:
  name: material
  icon:
    logo: material/pine-tree
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "Copyright &copy; Reihan Apriandi"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hansen-arch
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/reihan-apriandi-700845266/
    - icon: material/email
      link: mailto:apriandireihan@gmail.com

plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "BioSift": projects/biosift.md
    - "Student Stress Analysis": projects/student-stress.md
  - Experience: experience.md
  - Contact: contact.md